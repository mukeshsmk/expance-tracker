<header class="topbar">
  <button class="icon-btn mobile-only" (click)="menuToggle.emit()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="spacer"></div>

  <button class="icon-btn" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <button class="icon-btn" [matMenuTriggerFor]="notifMenu" aria-label="Notifications" [matBadge]="unreadCount() > 0 ? unreadCount() : null" matBadgeColor="warn" matBadgeSize="small">
    <mat-icon>notifications</mat-icon>
  </button>

  <mat-menu #notifMenu="matMenu" class="notif-menu">
    <div class="notif-header" (click)="$event.stopPropagation()">Notifications</div>
    <button mat-menu-item *ngFor="let n of notifications().slice(0, 8)" (click)="markRead(n)" class="notif-item" [class.unread]="!n.isRead">
      <mat-icon>{{ notificationIcon(n.type) }}</mat-icon>
      <span>{{ n.message }}</span>
    </button>
    <div class="notif-empty" *ngIf="notifications().length === 0">No notifications yet</div>
  </mat-menu>
</header>
