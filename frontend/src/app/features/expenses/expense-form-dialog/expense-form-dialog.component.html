<h2 mat-dialog-title>{{ isEdit ? 'Edit Expense' : 'Add Expense' }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>Created By</mat-label>
      <mat-select formControlName="createdByName">
        @for (eng of engineers(); track eng._id) {
          <mat-option [value]="eng.name">{{ eng.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="expenseDate" />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Reason</mat-label>
      <input matInput formControlName="description" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Price (₹)</mat-label>
      <input matInput type="number" formControlName="amount" />
    </mat-form-field>

    <div class="span-2 file-upload">
      <input type="file" id="billFile" accept="image/*" (change)="onFileSelected($event)" hidden />
      <label for="billFile" class="file-label">
        <mat-icon>attach_file</mat-icon>
        {{ selectedFile()?.name || 'Upload Image (optional)' }}
      </label>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="ref.close()">Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="saving()">
      @if (saving()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        Save
      }
    </button>
  </mat-dialog-actions>
</form>
